name: build-images

# CI success → build backend/frontend images → GHCR. A broken test run can
# never replace the production `latest` tag.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # 推 ghcr 需要
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            build_args: ""
          - name: frontend
            context: ./frontend
            build_args: |
              NEXT_PUBLIC_BACKEND=/api
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - name: Prevent stale CI run from replacing latest
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
            echo "A newer main commit exists; refusing to publish this older commit as latest."
            exit 1
          }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/nagileo/otomo-${{ matrix.name }}:latest
            ghcr.io/nagileo/otomo-${{ matrix.name }}:${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          build-args: ${{ matrix.build_args }}
          # GitHub Actions 层缓存:torch 等大层只构建/推送一次,之后改代码秒级
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
