name: build-images

# push → 构建 backend/frontend 镜像 → 推 ghcr.io。服务器只 pull,不再自己 build。
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose*.yml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # 推 ghcr 需要
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            build_args: ""
          - name: frontend
            context: ./frontend
            build_args: |
              NEXT_PUBLIC_BACKEND=/api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/nagileo/otomo-${{ matrix.name }}:latest
            ghcr.io/nagileo/otomo-${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          # GitHub Actions 层缓存:torch 等大层只构建/推送一次,之后改代码秒级
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
