name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      golden_runner:
        description: "Golden eval runner"
        required: false
        default: "adaptive"
        type: choice
        options:
          - adaptive
          - react
          - plan
      golden_limit:
        description: "Limit cases; 0 means all"
        required: false
        default: "0"
        type: string

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Lint backend
        run: ruff check otomo tests scripts
      - name: Run tests
        run: pytest -m "not external"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Build frontend
        run: npm run build

  golden-eval:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      BANGUMI_TOKEN: ${{ secrets.BANGUMI_TOKEN }}
      BANGUMI_USER_AGENT: ${{ secrets.BANGUMI_USER_AGENT }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Run golden eval
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "LLM_API_KEY secret is required for golden eval"
            exit 1
          fi
          python -m otomo.eval.runner \
            --runner "${{ inputs.golden_runner }}" \
            --limit "${{ inputs.golden_limit }}" \
            --json-report ../golden-report.json
      - name: Upload golden report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-report
          path: golden-report.json
