# Otomo 可验证 golden cases（A2 种子集；目标 30 条，先 10 条跑通 harness）
# 校验规则见 backend/otomo/eval/verifier.py：
#   expect_contains 全部出现 / expect_any 至少一个 / expect_absent 都不得出现 / expect_tools 至少调用过
# 选用 CN/JP 同形汉字的稳定事实；名字两种写法用 expect_any 兜住。

- id: bocchi_year
  question: 动画《孤独摇滚！》是哪一年开始播出的？
  kind: single_hop
  expect_contains: ["2022"]
  expect_tools: ["search_subjects"]

- id: bocchi_hitori_cv
  question: 动画《孤独摇滚！》里 後藤一里 的声优是谁？
  kind: two_hop
  expect_contains: ["青山吉能"]
  expect_tools: ["get_character_persons"]

- id: aoyama_other_anime
  question: 声优 青山吉能 除了《孤独摇滚！》还配过哪些动画？列两部。
  kind: two_hop
  expect_absent: ["无法查到", "查不到", "没有相关"]
  expect_tools: ["get_person_subjects"]
  note: 验证声优→作品一跳能取到非空结果

- id: clannad_nagisa_cv
  question: 《CLANNAD》中 古河渚 的声优是谁？
  kind: two_hop
  expect_contains: ["中原麻衣"]
  expect_tools: ["get_character_persons"]

- id: haruhi_cv
  question: 《凉宫春日的忧郁》中 凉宫春日 的声优是谁？
  kind: two_hop
  expect_any: ["平野綾", "平野绫"]
  expect_tools: ["get_character_persons"]

- id: yuru_nadeshiko_cv
  question: 《摇曳露营△》里 各务原抚子 的声优是谁？
  kind: two_hop
  expect_any: ["花守由美里", "花守ゆみり", "花守"]
  expect_tools: ["get_character_persons"]

- id: steins_kurisu_cv
  question: 《命运石之门》里 牧濑红莉栖 的声优是谁？
  kind: two_hop
  expect_contains: ["今井麻美"]
  expect_tools: ["get_character_persons"]

- id: refuse_bd_sales
  question: 《孤独摇滚！》的 BD（蓝光）销量是多少张？
  kind: refusal
  expect_any: ["无法", "查不到", "没有", "不在", "抱歉", "无法提供", "暂"]
  expect_absent: ["销量约", "销量为", "万张"]
  note: BD 销量不在 Bangumi 数据范围 → 应校准化拒答，不得编造

- id: refuse_news
  question: 《孤独摇滚！》第二季有什么尚未公开的独家爆料和最新内幕消息？
  kind: refusal
  expect_any: ["无法", "查不到", "没有", "暂", "不", "抱歉"]
  note: 资讯/未公开消息不在数据范围 → 应拒答

- id: kon_yui_cv
  question: 《K-ON！轻音少女》里 平泽唯 的声优是谁？
  kind: two_hop
  expect_any: ["丰崎爱生", "豊崎愛生", "丰崎", "豊崎"]
  expect_tools: ["get_character_persons"]

- id: bocchi_studio
  question: 动画《孤独摇滚！》是哪家公司制作的（动画制作）？
  kind: two_hop
  expect_any: ["CloverWorks", "Clover"]
  expect_tools: ["get_subject_persons"]

- id: frieren_year
  question: 《葬送的芙莉莲》动画是哪一年开始播出的？
  kind: single_hop
  expect_any: ["2023", "2024"]
  expect_tools: ["search_subjects"]

- id: madoka_cv
  question: 《魔法少女小圆》里 鹿目圆 的声优是谁？
  kind: two_hop
  expect_contains: ["悠木碧"]
  expect_tools: ["get_character_persons"]

- id: konosuba_aqua_cv
  question: 《为美好的世界献上祝福！》里 阿库娅 的声优是谁？
  kind: two_hop
  expect_any: ["雨宫天", "雨宮天", "雨宫", "雨宮"]
  expect_tools: ["get_character_persons"]

- id: lelouch_cv
  question: 《Code Geass 反叛的鲁路修》里 鲁路修 的声优是谁？
  kind: two_hop
  expect_any: ["福山润", "福山潤", "福山"]
  expect_tools: ["get_character_persons"]

- id: refuse_goods_price
  question: 《孤独摇滚！》后藤一里的手办现在卖多少钱？
  kind: refusal
  expect_any: ["无法", "查不到", "没有", "不", "抱歉", "建议"]
  expect_absent: ["售价约", "价格为"]
  note: 周边价格不在 Bangumi 数据范围 → 应校准化拒答

- id: refuse_watch_platform
  question: 《孤独摇滚！》现在在哪个网站能看？给我能直接看的链接。
  kind: refusal
  expect_any: ["无法", "没有", "不", "建议", "暂", "抱歉"]
  note: A2 暂无"在哪看"工具 → 不应臆测平台/链接，应说明并建议官方渠道

- id: lore_bocchi_nickname
  question: 《孤独摇滚！》里 后藤一里 在乐队里的外号（爱称）是什么？
  kind: two_hop
  expect_any: ["波奇", "ぼっち", "小孤独"]
  expect_tools: ["lore_search"]
  min_tools: 1
  note: RAG——设定/外号需查萌娘百科，并应挂来源

# —— Phase 1 证据面板 cases（断言 source routing 命中 + 结构化面板 data 产出；不断言不稳定的推荐/评价内容）——
- id: panel_review_bocchi
  question: 如何评价动画《孤独摇滚！》？从多个来源综合说说口碑。
  kind: two_hop
  expect_tools: ["review_subject"]
  expect_panels: ["review_subject"]
  note: 评价矩阵——应调 review_subject 产出 ratings/aspect_summary 面板
- id: panel_season_2026_07
  question: 2026 年 7 月有哪些新番？按我的口味做个导视分诊。
  kind: filter
  expect_tools: ["season_guide_brief"]
  forbid_tools: ["web_search"]
  expect_panels: ["season_guide_brief"]
  note: 季番导视——应调 season_guide_brief、不应 web_search 兜底
- id: panel_recommend
  question: 根据我的 Bangumi 口味，推荐几部我没看过的动画。
  kind: filter
  expect_tools: ["recommend_subjects"]
  expect_panels: ["recommend_subjects"]
  note: 推荐——应调 recommend_subjects 产出推荐面板（需 token）
- id: panel_taste_sai
  question: 我和 Bangumi 用户 sai 的口味同步率高吗？
  kind: two_hop
  expect_tools: ["compare_user_taste"]
  expect_panels: ["compare_user_taste"]
  note: 同步率——应调 compare_user_taste 产出 affinity 面板（需 token）

# —— Phase 5 memory cases（断言 agent 主动调 memory 工具 + 面板产出；写入断言靠 test_memory.py 单测）——
- id: mem_remember_dislike
  question: 我特别讨厌党争番，以后别给我推这种。
  expect_tools: ["remember_user_preference"]
  note: 强避雷信号应写入长期记忆（dislike 党争）
- id: mem_recall_panel
  question: 看看你都记住了我哪些口味偏好和避雷点？
  expect_tools: ["get_user_memory"]
  expect_panels: ["get_user_memory"]
  note: 应调 get_user_memory 并产出 memory 面板（需 token）

# —— Phase 6 推荐 v2 cases（aspect 解释 / galgame 三源 / critiquing；写入断言靠 test_phase6 单测）——
- id: rec_aspect_explain
  question: 根据我的口味推荐几部动画，并说说为什么适合我。
  expect_tools: ["recommend_subjects"]
  expect_panels: ["recommend_subjects"]
  note: 解释应出现 aspect 级理由（不只 tag）；可先 build_aspect_profile（需 token）
- id: rec_galgame_three_source
  question: 推荐几部高口碑 galgame，Bangumi、批判空间、VNDB 都参考一下。
  expect_tools: ["recommend_subjects"]
  note: galgame 应出现三源圈层对比（中文圈/日本 gal 圈/国际 VN 圈）
- id: rec_critique_shorter
  kind: multi_turn
  turns:
    - question: 根据我的 Bangumi 口味推荐几部动画。
      expect_tools: ["recommend_subjects"]
      expect_panels: ["recommend_subjects"]
    - question: 这些太长了，换几部短一点的。
      expect_tools: ["recommend_subjects"]
      expect_any: ["短", "集", "换"]
  note: 应识别 critiquing → 同 session 承接上一轮结果，用 exclude_ids/max_episodes 等约束重推

- id: spoiler_persist_across_turns
  kind: multi_turn
  turns:
    - question: 我正在看《摇曳露营△》第一季，到第5集为止，后面请默认别剧透。
      expect_any: ["不剧透", "无剧透", "第5", "第 5"]
    - question: 那后面还值得继续看吗？评价一下但别剧透。
      expect_absent: ["结局", "真相", "最终", "最后死"]
      forbid_tools: ["get_episode_comments"]
  note: 同 session 中自然语言进度/无剧透偏好应延续到下一轮

# —— 收口 cases（探索网络 / 评分预测 / 萌点检索 / 分集雷达）——
- id: explore_cv_network
  question: 声优 花守ゆみり 还配过哪些高分动画？
  expect_tools: ["explore_voice_network"]
  expect_panels: ["explore_voice_network"]
  note: 声优出演网络，应产出探索面板
- id: predict_my_rating
  question: 你估我会给《孤独摇滚！》打几分？
  expect_tools: ["predict_my_rating"]
  note: 画像级评分预测（需 token）；要说明是估计非真实
- id: trait_search
  question: 找几部 百合 + 日常 的高分番。
  expect_tools: ["search_by_traits"]
  note: 多标签交集筛选
- id: episode_radar
  question: 《孤独摇滚！》哪几集讨论最热闹？
  expect_tools: ["episode_buzz_radar"]
  expect_panels: ["episode_buzz_radar"]
  note: 分集讨论数雷达，应产出曲线面板
